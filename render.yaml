services:
  - type: web
    name: kpi-ml-service
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "kpi-ml-service.onrender.com"
      - key: DATABASE_URL
        sync: false          # вводишь вручную в Render dashboard
      - key: DB_SEARCH_PATH
        value: "ml"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_BUCKET
        value: "ml-models"
      - key: ML_API_KEY
        sync: false
      - key: DJANGO_SUPERUSER_CREATE
        value: "false"
      - key: DJANGO_SUPERUSER_USERNAME
        sync: false
      - key: DJANGO_SUPERUSER_EMAIL
        sync: false
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false
      - key: DJANGO_SUPERUSER_UPDATE_PASSWORD
        value: "false"
      - key: DJANGO_SUPERUSER_STRICT
        value: "false"
      - key: ML_MAX_PREDICT_BATCH
        value: "1000"
      - key: ML_EXCLUDED_ROLES
        value: "HR,ADMIN,COMMISSION"
      - key: ML_BOOTSTRAP_ON_START
        value: "true"
      - key: ML_BOOTSTRAP_LOAD_DATASET
        value: "true"
      - key: ML_BOOTSTRAP_TRAIN
        value: "true"
      - key: ML_BOOTSTRAP_MODEL_TYPES
        value: "linear_regression,random_forest,decision_tree"
      - key: ML_BOOTSTRAP_PRIMARY_MODEL_TYPE
        value: "random_forest"
      - key: ML_BOOTSTRAP_STRICT
        value: "false"
    healthCheckPath: /api/health/
