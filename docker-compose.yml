services:
  kpi-ml-service:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.local
    environment:
      DATABASE_URL: sqlite:////app/data/db.sqlite3
      MODEL_CACHE_DIR: /app/.model_cache
    ports:
      - "8001:8001"
    volumes:
      - ml_data:/app/data
      - ml_model_cache:/app/.model_cache
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/health/"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

volumes:
  ml_data:
  ml_model_cache:
